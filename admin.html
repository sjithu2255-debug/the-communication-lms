<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* Modern styling with glassmorphism, rich colors, dark mode defaults */
:root {
  --bg: #0B0D12;
  --surface: #14171F;
  --glass: rgba(255, 255, 255, 0.05);
  --border: rgba(255, 255, 255, 0.1);
  --text: #F3F1EC;
  --text-dim: #9BA0AD;
  --accent1: #E8823C;
  --accent2: #9D5CE0;
  --accent3: #3FAE7A;
  --accent4: #4A9FE0;
}
body {
  margin: 0; padding: 0; background: var(--bg); color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex; flex-direction: column;
}
.header {
  padding: 24px 40px; border-bottom: 1px solid var(--border);
  background: var(--surface); display: flex; justify-content: space-between; align-items: center;
}
.header h1 {
  font-family: 'Fredoka', sans-serif; margin: 0; font-size: 24px;
  background: linear-gradient(90deg, var(--accent2), var(--accent4));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.container {
  padding: 40px; max-width: 1200px; margin: 0 auto; width: 100%; flex: 1; box-sizing: border-box;
}
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px;
}
.stat-card {
  background: var(--glass); border: 1px solid var(--border); border-radius: 16px;
  padding: 24px; text-align: center; backdrop-filter: blur(10px);
  transition: transform 0.2s;
}
.stat-card:hover { transform: translateY(-5px); }
.stat-card h3 { margin: 0 0 10px 0; font-size: 36px; font-family: 'Fredoka', sans-serif; color: var(--text); }
.stat-card p { margin: 0; color: var(--text-dim); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

.table-wrapper {
  background: var(--glass); border: 1px solid var(--border); border-radius: 16px;
  backdrop-filter: blur(10px); overflow: hidden;
}
table {
  width: 100%; border-collapse: collapse; text-align: left;
}
th, td {
  padding: 16px 24px; border-bottom: 1px solid var(--border);
}
th {
  background: rgba(0,0,0,0.2); font-weight: 600; color: var(--text-dim); font-size: 13px; text-transform: uppercase;
}
td { font-size: 15px; }
tr:last-child td { border-bottom: none; }
tr:hover { background: rgba(255,255,255,0.02); }

.progress-bar {
  height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; width: 100%; margin-top: 6px;
}
.progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent3), var(--accent4)); border-radius: 4px;
}
.badge {
  display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600;
  background: rgba(255,255,255,0.1); margin-right: 4px; margin-bottom: 4px;
}
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }

.blobs {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; overflow: hidden;
}
.blob {
  position: absolute; filter: blur(100px); border-radius: 50%; opacity: 0.4;
}
.blob-1 { top: -100px; left: -100px; width: 400px; height: 400px; background: var(--accent2); }
.blob-2 { bottom: -100px; right: -100px; width: 500px; height: 500px; background: var(--accent4); }
</style>
</head>
<body>
<div class="blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
</div>

<header class="header">
  <h1>Admin Dashboard</h1>
  <div>
    <button onclick="window.location.href='index.html'" style="background:rgba(255,255,255,0.08); backdrop-filter:blur(22px) saturate(160%); -webkit-backdrop-filter:blur(22px) saturate(160%); border:1px solid rgba(255,255,255,0.16); border-radius:16px; border:1px solid var(--border); color:var(--text); padding:8px 16px; border-radius:8px; cursor:pointer; font-family:'Inter', sans-serif;">Back to App</button>
  </div>
</header>

<div class="container">
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card">
      <h3 id="totalUsers">0</h3>
      <p>Total Users</p>
    </div>
    <div class="stat-card">
      <h3 id="activeLearners">0</h3>
      <p>Active Learners</p>
    </div>
    <div class="stat-card">
      <h3 id="avgProgress">0%</h3>
      <p>Avg Progress</p>
    </div>
  </div>

  <div class="table-wrapper">
    <table id="usersTable">
      <thead>
        <tr>
          <th>User</th>
          <th>Progress</th>
          <th>Topics State</th>
          <th>Status</th>
            <th style="text-align:right;">Actions</th>
        </tr>
      </thead>
      <tbody id="usersBody">
        <!-- Rendered by JS -->
      </tbody>
    </table>
    <div id="emptyState" class="empty-state" style="display:none;">
      No users found.
    </div>
  </div>
</div>

<script>
const ACCOUNTS_KEY = 'grammar_accounts_v1';
const PROGRESS_PREFIX = 'grammar_progress_v1:';

function loadAdminData() {
  const accountsRaw = localStorage.getItem(ACCOUNTS_KEY);
  let accounts = {};
  if (accountsRaw) {
    try { accounts = JSON.parse(accountsRaw); } catch(e) {}
  }

  const emails = Object.keys(accounts);
  let activeLearners = 0;
  let totalProgressPct = 0;
  let usersData = [];

  const tbody = document.getElementById('usersBody');
  tbody.innerHTML = '';

  if (emails.length === 0) {
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('usersTable').style.display = 'none';
    return;
  }

  // Calculate TOTAL_TOPICS based on index.html data
  // Currently there are 18 topics based on previous knowledge or standard count, we'll just count them up to 18 as a baseline if we can't find out exactly.
  // Actually, we can fetch index.html DATA or just assume 18 based on typical English apps. 
  // Let's use 18 for now, but users can see mastered absolute counts.
  const TOTAL_TOPICS = 18; 

  emails.forEach(email => {
    const acc = accounts[email];
    const progRaw = localStorage.getItem(PROGRESS_PREFIX + email);
    let progress = {};
    if (progRaw) {
      try { progress = JSON.parse(progRaw); } catch(e) {}
    }

    const topicIds = Object.keys(progress);
    let masteredCount = 0;
    let triedCount = 0;
    
    topicIds.forEach(t => {
      if (progress[t].mastered) masteredCount++;
      else triedCount++;
    });

    if (masteredCount > 0 || triedCount > 0) {
      activeLearners++;
    }

    let pct = Math.round((masteredCount / TOTAL_TOPICS) * 100) || 0;
    if (pct > 100) pct = 100;
    
    totalProgressPct += pct;

    usersData.push({
      email: email,
      name: acc.name || 'Unknown',
      mastered: masteredCount,
      tried: triedCount,
      pct: pct
    });
  });

  document.getElementById('totalUsers').textContent = emails.length;
  document.getElementById('activeLearners').textContent = activeLearners;
  document.getElementById('avgProgress').textContent = emails.length ? Math.round(totalProgressPct / emails.length) + '%' : '0%';

  usersData.sort((a,b) => b.pct - a.pct);

  usersData.forEach(u => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <div style="font-weight:600; color:var(--text);">${u.name}</div>
        <div style="font-size:12px; color:var(--text-dim); margin-top:2px;">${u.email}</div>
      </td>
      <td>
        <div style="font-size:13px; margin-bottom:4px;">${u.pct}% Mastered</div>
        <div class="progress-bar">
          <div class="progress-fill" style="width: ${u.pct}%"></div>
        </div>
      </td>
      <td>
        <span class="badge" style="color:var(--accent3); background: rgba(63,174,122,0.15)">${u.mastered} Mastered</span>
        <span class="badge" style="color:var(--text-dim)">${u.tried} Tried</span>
      </td>
      <td style="color:var(--text-dim); font-size:13px;">
        ${u.status === 'pending' ? `<button style="padding:6px 12px; font-size:12px; background:var(--accent3); border:none; border-radius:8px; cursor:pointer; font-weight:600; color:#fff; margin-right:6px;" onclick="approveUser('${u.email}')">Approve</button><button style="padding:6px 12px; font-size:12px; background:rgba(224,101,74,0.15); color:#F5A38A; border:1px solid rgba(224,101,74,0.3); border-radius:8px; cursor:pointer; font-weight:600;" onclick="rejectUser('${u.email}')">Reject</button>` : (u.status === 'rejected' ? '<span style="color:#F5A38A; font-weight:600;">Rejected</span>' : ((u.mastered || u.tried) ? '<span style="color:var(--accent3); font-weight:600;">Active</span>' : 'Not started'))}
      </td>
      <td style="text-align:right;">
        <button style="padding:6px 12px; font-size:12px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:8px; cursor:pointer; color:var(--paper); margin-right:6px;" onclick="viewUserProgress('${u.email}')">View Progress</button>
        ${u.email !== 'jithu.sreekumar@searce.com' ? `<button style="padding:6px 12px; font-size:12px; background:rgba(224,101,74,0.15); color:#F5A38A; border:1px solid rgba(224,101,74,0.3); border-radius:8px; cursor:pointer;" onclick="removeUser('${u.email}')">Remove</button>` : ''}
      </td>
    `;
    tbody.appendChild(tr);
  });
}


window.approveUser = function(email) {
  let accs = JSON.parse(localStorage.getItem('comms_accounts')) || {};
  if(accs[email]) {
    accs[email].status = 'approved';
    localStorage.setItem('comms_accounts', JSON.stringify(accs));
    loadAdminData();
  }
};
window.removeUser = function(email) {
  if (email === 'jithu.sreekumar@searce.com') return;
  if (confirm('Are you sure you want to completely remove this user?')) {
    let accs = JSON.parse(localStorage.getItem('comms_accounts')) || {};
    delete accs[email];
    localStorage.setItem('comms_accounts', JSON.stringify(accs));
    localStorage.removeItem('comms_progress_' + email);
    loadAdminData();
  }
};

window.viewUserProgress = function(email) {
  const progressStr = localStorage.getItem('comms_progress_' + email);
  let progress = {};
  if (progressStr) {
    try { progress = JSON.parse(progressStr); } catch(e){}
  }
  
  let rows = Object.keys(progress).map(topicId => {
    const p = progress[topicId];
    return `<li>${topicId}: ${p === 10 ? 'Mastered (10/10)' : 'Tried (' + p + '/10)'}</li>`;
  }).join('');
  
  if (!rows) rows = "<li>No progress started.</li>";
  
  alert("Progress for " + email + ":\n\n" + rows.replace(/<[^>]*>?/gm, ''));
};

window.rejectUser = function(email) {
  let accs = JSON.parse(localStorage.getItem('comms_accounts')) || {};
  if(accs[email]) {
    accs[email].status = 'rejected';
    localStorage.setItem('comms_accounts', JSON.stringify(accs));
    loadAdminData();
  }
};
loadAdminData();
</script>
</body>
</html>
