<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>English, Conversationally</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14171F; --ink-deep:#0B0D12; --surface:#232836; --surface-2:#2A303F;
    --paper:#F3F1EC; --paper-dim:#9BA0AD; --line:rgba(255,255,255,0.09);
    --connectors:#E8823C; --modals:#9D5CE0; --tenses:#3FAE7A; --preps:#4A9FE0;
    --good:#3FAE7A; --bad:#E0654A;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  html{ overflow-x:hidden; }
  body{
    background:var(--ink-deep); min-height:100vh;
    font-family:'Inter',sans-serif; color:var(--paper);
    -webkit-tap-highlight-color: transparent;
    overflow-x:hidden;
  }
  button{font-family:inherit;}
  .app-shell{
    width:100%; margin:0 auto; min-height:100vh; background:var(--ink);
    display:flex; flex-direction:column; position:relative; overflow-x:hidden;
  }
  .app-shell > *{ min-width:0; }
  
  @media (min-width:768px){
    .topbar, .account-bar, .filters, .topic-list, .thread-header, .thread-body, .quiz-footer, .results-wrap {
      max-width: 860px;
      margin-left: auto;
      margin-right: auto;
      width: 100%;
    }
    .topic-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      padding: 24px;
      align-content: start;
    }
    .topic-row {
      border: 1px solid var(--line) !important;
      border-radius: 16px;
      padding: 16px;
    }
    .section-label {
      grid-column: 1 / -1;
      padding: 16px 0 4px !important;
    }
  }
  button:focus-visible, .topic-row:focus-visible{ outline:2px solid var(--paper); outline-offset:2px; }

  /* ---------- Top bar ---------- */
  .topbar{ display:flex; align-items:center; justify-content:space-between; gap:12px; padding:18px 18px 14px; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--ink); z-index:5; }
  .brand{ font-family:'Fredoka',sans-serif; font-weight:600; font-size:18px; line-height:1.25; }
  .brand small{ display:block; font-family:'Inter',sans-serif; font-weight:500; font-size:12px; color:var(--paper-dim); margin-top:3px; letter-spacing:0.2px; }
  .progress-ring{ width:44px;height:44px;border-radius:50%; flex:0 0 auto; display:flex;align-items:center;justify-content:center; background:conic-gradient(var(--paper) calc(var(--pct)*1%), rgba(255,255,255,0.12) 0); }
  .progress-ring span{ width:35px;height:35px;border-radius:50%; background:var(--ink); display:flex;align-items:center;justify-content:center; font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:600; }

  /* ---------- Filter pills ---------- */
  .filters{ display:flex; gap:8px; padding:12px 16px; overflow-x:auto; border-bottom:1px solid var(--line); scrollbar-width:none; }
  .filters::-webkit-scrollbar{ display:none; }
  .pill{ flex:0 0 auto; padding:7px 14px; border-radius:999px; font-size:12.5px; font-weight:600; border:1.5px solid var(--line); background:transparent; color:var(--paper-dim); cursor:pointer; white-space:nowrap; transition:background .15s,border-color .15s,color .15s; }
  .pill.active{ color:#0d0f14; border-color:transparent; }

  /* ---------- Topic list ---------- */
  .topic-list{ flex:1; overflow-y:auto; padding-bottom:24px; }
  .section-label{ padding:16px 16px 4px; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:1.2px; text-transform:uppercase; font-weight:600; }
  .topic-row{ all:revert; display:flex; align-items:center; gap:12px; width:100%; padding:11px 16px; border:none; border-bottom:1px solid var(--line); background:transparent; color:inherit; font:inherit; text-align:left; cursor:pointer; }
  .topic-row:active{ background:rgba(255,255,255,0.04); }
  .avatar{ width:42px;height:42px;border-radius:13px; display:flex;align-items:center;justify-content:center; font-size:20px; flex:0 0 42px; }
  .topic-main{ flex:1; min-width:0; }
  .topic-title-row{ display:flex; align-items:baseline; gap:7px; flex-wrap:wrap; }
  .topic-title{ font-family:'Fredoka',sans-serif; font-weight:600; font-size:14.5px; }
  .topic-persona{ font-size:11px; color:var(--paper-dim); }
  .topic-preview{ font-size:12.5px; color:var(--paper-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
  .status{ flex:0 0 auto; width:26px;height:26px;border-radius:50%; display:flex;align-items:center;justify-content:center; border:2px solid var(--line); font-size:13px; }
  .status.mastered{ border-color:var(--good); background:rgba(63,174,122,0.15); color:var(--good); font-weight:700; }
  .status.tried{ font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--paper-dim); border-color:var(--paper-dim); }

  /* ---------- Thread header (topic + quiz) ---------- */
  .thread-header{ display:flex; align-items:center; gap:10px; padding:14px 16px; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--ink); z-index:5; }
  .back-btn{ all:revert; width:34px;height:34px;border-radius:10px; display:flex;align-items:center;justify-content:center; background:var(--surface); border:none; color:var(--paper); font-size:17px; cursor:pointer; flex:0 0 auto; font-family:inherit; }
  .thread-title{ font-family:'Fredoka',sans-serif; font-weight:600; font-size:15.5px; }
  .thread-persona{ font-size:12px; color:var(--paper-dim); margin-top:1px; }
  .quiz-progress-track{ height:3px; background:var(--surface); }
  .quiz-progress-fill{ height:100%; transition:width .25s ease; }

  /* ---------- Chat thread body ---------- */
  .thread-body{ flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
  .thread-body.centered{ justify-content:center; }
  .pinned-note{ align-self:center; max-width:94%; font-size:13px; line-height:1.55; padding:12px 14px; border-radius:14px; background:var(--surface); border:1px solid var(--line); }
  .pinned-note > div + div{ margin-top:8px; }
  .tag{ font-family:'IBM Plex Mono',monospace; font-size:9.5px; font-weight:600; letter-spacing:0.6px; padding:2px 7px; border-radius:6px; margin-right:7px; display:inline-block; vertical-align:middle; white-space:nowrap; }
  .bubble-row{ display:flex; }
  .bubble-row.in{ justify-content:flex-start; }
  .bubble-row.out{ justify-content:flex-end; }
  .bubble{ max-width:80%; padding:10px 14px; border-radius:16px; font-size:14.5px; line-height:1.42; }
  .bubble.in{ background:var(--surface); border-bottom-left-radius:4px; }
  .bubble.out{ color:#12141a; font-weight:600; border-bottom-right-radius:4px; }

  /* ---------- Quiz answers ---------- */
  .chips-wrap{ display:flex; flex-wrap:wrap; gap:8px; margin-top:2px; }
  .options-stack{ display:flex; flex-direction:column; gap:8px; margin-top:2px; }
  .chip{ all:revert; font-family:inherit; padding:10px 15px; border-radius:999px; border:1.5px solid var(--line); background:var(--surface); color:var(--paper); font-size:13.5px; font-weight:600; cursor:pointer; transition:transform .1s, background .15s, border-color .15s; }
  .chip:active{ transform:scale(0.97); }
  .chip.wide{ width:100%; text-align:left; border-radius:12px; font-weight:500; }
  .chip.correct{ background:rgba(63,174,122,0.18); border-color:var(--good); color:#B7EBC6; }
  .chip.incorrect{ background:rgba(224,101,74,0.18); border-color:var(--bad); color:#F5C3B4; }
  .chip.dim{ opacity:0.45; }
  .chip[disabled]{ cursor:default; }
  .pinned-note.feedback{ align-self:stretch; text-align:left; }
  .pinned-note.feedback.good{ border-color:rgba(63,174,122,0.4); background:rgba(63,174,122,0.09); }
  .pinned-note.feedback.bad{ border-color:rgba(224,101,74,0.4); background:rgba(224,101,74,0.09); }

  /* ---------- Footer / buttons ---------- */
  .quiz-footer{ padding:14px 16px; border-top:1px solid var(--line); }
  .btn-primary{ all:revert; width:100%; padding:14px; border-radius:14px; border:none; font-family:'Fredoka',sans-serif; font-weight:600; font-size:14.5px; cursor:pointer; color:#0d0f14; text-align:center; }
  .btn-secondary{ all:revert; padding:14px; border-radius:14px; border:1.5px solid var(--line); background:transparent; color:var(--paper); font-family:'Fredoka',sans-serif; font-weight:600; font-size:14.5px; cursor:pointer; text-align:center; }
  .btn-row{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:16px; }
  .btn-row .btn-primary, .btn-row .btn-secondary{ flex:1; min-width:130px; }

  /* ---------- Results ---------- */
  .results-wrap{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 24px; text-align:center; position:relative; overflow:hidden; }
  .score-badge{ font-family:'Fredoka',sans-serif; font-size:54px; font-weight:700; line-height:1; }
  .results-msg{ font-size:14.5px; color:var(--paper-dim); max-width:320px; margin-top:10px; line-height:1.5; }
  .confetti-piece{ position:absolute; top:-12px; width:7px; height:13px; border-radius:2px; animation:fall 2s ease-in forwards; }
  @keyframes fall{ to{ transform:translateY(460px) rotate(420deg); opacity:0; } }

  /* ---------- Account bar ---------- */
  .account-bar{ display:flex; align-items:center; justify-content:space-between; padding:8px 18px; font-size:11.5px; color:var(--paper-dim); border-bottom:1px solid var(--line); }
  .account-bar .who{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .logout-btn{ all:revert; flex:0 0 auto; font-family:'Inter',sans-serif; font-size:11.5px; font-weight:600; color:var(--paper-dim); background:transparent; border:none; cursor:pointer; text-decoration:underline; padding:0; margin-left:12px; }
  .logout-btn:hover{ color:var(--paper); }

  /* ---------- Auth (glassmorphism) ---------- */
  .auth-screen{ position:relative; flex:1; display:flex; align-items:center; justify-content:center; padding:32px 24px; overflow:hidden; }
  .auth-blob{ position:absolute; border-radius:50%; filter:blur(60px); opacity:0.5; pointer-events:none; }
  .auth-blob.b1{ width:260px;height:260px; background:var(--connectors); top:-70px; left:-70px; }
  .auth-blob.b2{ width:230px;height:230px; background:var(--preps); bottom:-50px; right:-60px; }
  .auth-blob.b3{ width:200px;height:200px; background:var(--modals); bottom:12%; left:-70px; }
  .auth-blob.b4{ width:190px;height:190px; background:var(--tenses); top:8%; right:-60px; }
  .auth-card{ position:relative; z-index:1; width:100%; max-width:340px; background:rgba(255,255,255,0.08); backdrop-filter:blur(22px) saturate(160%); -webkit-backdrop-filter:blur(22px) saturate(160%); border:1px solid rgba(255,255,255,0.16); border-radius:24px; padding:30px 24px; box-shadow:0 8px 40px rgba(0,0,0,0.45); }
  .auth-emoji{ font-size:32px; margin-bottom:8px; }
  .auth-title{ font-family:'Fredoka',sans-serif; font-weight:600; font-size:19px; margin-bottom:5px; }
  .auth-sub{ font-size:12.5px; color:var(--paper-dim); margin-bottom:22px; line-height:1.45; }
  .auth-field{ margin-bottom:12px; }
  .auth-field input{ appearance:none; -webkit-appearance:none; width:100%; padding:13px 14px; border-radius:13px; border:1px solid rgba(255,255,255,0.16); background:rgba(255,255,255,0.06); color:var(--paper); font-family:'Inter',sans-serif; font-size:14.5px; outline:none; transition:border-color .15s, background .15s; }
  .auth-field input::placeholder{ color:rgba(243,241,236,0.38); }
  .auth-field input:focus{ border-color:rgba(255,255,255,0.4); background:rgba(255,255,255,0.11); }
  .auth-error{ font-size:12.5px; color:#F5A38A; background:rgba(224,101,74,0.15); border:1px solid rgba(224,101,74,0.3); padding:9px 12px; border-radius:10px; margin-bottom:12px; line-height:1.4; }
  .auth-note{ font-size:12.5px; color:#F0C97E; background:rgba(240,201,126,0.12); border:1px solid rgba(240,201,126,0.3); padding:9px 12px; border-radius:10px; margin-bottom:12px; line-height:1.4; }
  .auth-submit{ margin-top:4px; background:linear-gradient(135deg,var(--connectors),var(--preps)); }
  .auth-submit[disabled]{ opacity:0.6; cursor:default; }
  .auth-hint{ font-size:11px; color:var(--paper-dim); text-align:center; margin-top:18px; line-height:1.5; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; transition-duration:0.001ms !important; }
  }

  @media (min-width:768px){
    .auth-blob.b1{ width:500px;height:500px; top:-100px; left:-100px; filter:blur(100px); }
    .auth-blob.b2{ width:450px;height:450px; bottom:-100px; right:-100px; filter:blur(100px); }
    .auth-blob.b3{ width:350px;height:350px; bottom:15%; left:-50px; filter:blur(90px); }
    .auth-blob.b4{ width:350px;height:350px; top:15%; right:-50px; filter:blur(90px); }
    .auth-card{ max-width: 440px; padding: 40px 32px; }
    .auth-emoji{ font-size:42px; margin-bottom:12px; }
    .auth-title{ font-size:24px; margin-bottom:8px; }
    .auth-sub{ font-size:14px; margin-bottom:28px; }
  }
  .admin-th { padding:16px 24px; border-bottom:1px solid var(--line); background:rgba(0,0,0,0.2); font-weight:600; color:var(--paper-dim); font-size:13px; text-transform:uppercase; }
  .admin-td { padding:16px 24px; border-bottom:1px solid var(--line); }
  .admin-tr:last-child .admin-td { border-bottom:none; }
  .admin-tr:hover { background:rgba(255,255,255,0.02); }
</style>
</head>

<script type="module">
const DATA = {"topics": [{"id": "if", "section": 1, "title": "IF", "persona": "The Fortune Teller", "emoji": "🔮", "use": "States a condition — something that may or may not happen.", "avoid": "Don't use for certain or habitual events — use WHEN instead.", "examples": [["What happens if it rains tomorrow?", "If it rains, we will stay home."], ["What will you do if you win the lottery?", "If I win, I'll travel the world."]], "quiz": [["___ you finish early, call me.", ["If", "When", "Unless", "So"], 0, "Finishing early isn't guaranteed — that's a condition."], ["___ the alarm rings at 6, get up immediately.", ["If", "When", "As", "Whether"], 1, "The alarm ringing at 6 is expected, so use 'when.'"], ["___ I have enough savings, I'll buy a car next year.", ["When", "If", "Since", "Unless"], 1, "Having enough savings is uncertain — a condition."], ["___ the sun rises, the birds start singing.", ["If", "When", "Whether", "So"], 1, "Sunrise happens every day — it's certain, not conditional."], ["What should I do ___ the client cancels the meeting?", ["When", "If", "As", "Unless"], 1, "A cancellation is only possible, not certain."], ["___ you're free tonight, let's grab dinner.", ["When", "If", "As", "Whether"], 1, "Being free tonight isn't guaranteed."], ["___ you turn 18, you can vote.", ["If", "When", "Unless", "So"], 1, "Turning 18 will definitely happen — it's certain, not a condition."], ["___ the flight gets delayed, we'll wait at the lounge.", ["If", "When", "As", "So"], 0, "A delay is only a possibility."], ["___ it gets dark, turn on the porch light.", ["If", "When", "Unless", "Whether"], 1, "Darkness falls every evening — it's expected, not conditional."], ["___ the budget is approved, we can start hiring.", ["When", "If", "But", "As"], 1, "Approval isn't guaranteed, so it's a condition."]]}, {"id": "when", "section": 1, "title": "WHEN", "persona": "The Clockwork", "emoji": "⏰", "use": "Two actions at the same time, or a certain, expected time.", "avoid": "Don't use for uncertain or hypothetical events — use IF instead.", "examples": [["What did everyone do when she arrived?", "When she arrived, everyone stood up."], ["What do you do when you get home?", "When I get home, I feed the dog."]], "quiz": [["___ the meeting ends, we'll grab lunch.", ["If", "When", "As", "So"], 1, "The meeting ending is certain — just a matter of time."], ["___ I lose my keys, I panic a little.", ["When", "If", "Unless", "Whether"], 0, "This describes a repeated, expected pattern."], ["___ you don't submit the form by Friday, your application will be rejected.", ["When", "If", "As", "So"], 1, "Missing the deadline is only a possibility — a condition."], ["___ the guests arrive, please seat them in the lobby.", ["If", "When", "Whether", "Unless"], 1, "The guests arriving is expected and certain."], ["I'll let you know ___ I hear back from HR.", ["If", "When", "As", "So"], 1, "Hearing back will happen eventually — it's just a matter of timing."], ["___ there's no wifi, we can't join the call.", ["When", "If", "As", "So"], 1, "No wifi is only a possible situation, not a certainty."], ["___ the kettle boils, switch it off.", ["If", "When", "Whether", "Unless"], 1, "Boiling is the expected outcome of heating water."], ["___ you're ready, we'll begin the presentation.", ["If", "When", "As", "So"], 1, "This assumes you will be ready — just a matter of timing."], ["___ he doesn't apologize, I won't forgive him.", ["When", "If", "As", "So"], 1, "Apologizing (or not) is uncertain — a condition."], ["___ winter comes, the lake freezes over.", ["If", "When", "Unless", "Whether"], 1, "Winter arriving every year is a certain, recurring event."]]}, {"id": "as", "section": 1, "title": "AS", "persona": "The Two-Hat Wearer", "emoji": "🎭", "use": "Describes a role, or gives a reason.", "avoid": "Skip it when the meaning could be reason or time — BECAUSE or WHILE is clearer.", "examples": [["Why was she allowed to approve the leave?", "As the manager, she has the authority."], ["Why did you take an umbrella?", "As it looked cloudy, I took one."]], "quiz": [["___ team captain, Jake calls the coin toss.", ["As", "Because", "While", "Since"], 0, "This names Jake's role."], ["___ she was the most experienced nurse, she trained the new staff.", ["As", "While", "Unless", "So"], 0, "This points to her role as the reason she trained others."], ["___ the roads were icy, the school closed early.", ["Because", "As", "When", "Unless"], 0, "A plain cause — 'because' avoids any time confusion."], ["___ she was cooking dinner, she listened to a podcast.", ["While", "As", "So", "Because"], 0, "Two things happening at once — 'while' keeps it clearly about time."], ["___ the newly appointed manager, he introduced new policies.", ["As", "Because", "Whether", "Yet"], 0, "This names his role as manager."], ["___ prices kept rising, fewer people could afford rent.", ["Because", "As", "Until", "When"], 0, "This is the reason for the outcome — 'because' is clearest."], ["___ he was walking to the station, his phone rang.", ["While", "As", "If", "So"], 0, "Two actions at the same time — 'while' removes any ambiguity."], ["___ the eldest son, he inherited the family business.", ["As", "Because", "Among", "When"], 0, "This names his role in the family."], ["The client complained ___ the delivery was late.", ["Because", "As", "While", "Unless"], 0, "A clear reason, best said with 'because.'"], ["___ the referee, she has full control over the match.", ["As", "While", "Between", "So"], 0, "This names her role as referee."]]}, {"id": "so", "section": 1, "title": "SO", "persona": "The Domino Effect", "emoji": "🎳", "use": "Introduces a result.", "avoid": "Don't use it for the cause — that's BECAUSE.", "examples": [["Why didn't you go out?", "It was raining, so we stayed home."], ["Why is she smiling?", "She passed the exam, so she's thrilled."]], "quiz": [["The traffic was terrible, ___ we left an hour early.", ["so", "because", "but", "as"], 0, "Leaving early is the result of the traffic."], ["We stayed home ___ it was raining.", ["because", "so", "unless", "yet"], 0, "This gives the reason, so 'because' fits — not the result word 'so.'"], ["She studied hard, ___ she topped the class.", ["so", "because", "unless", "whether"], 0, "Topping the class is the result of studying hard."], ["He missed the bus ___ he woke up late.", ["so", "because", "yet", "until"], 1, "Waking up late is the cause of missing the bus."], ["The wifi was down, ___ we rescheduled the call.", ["so", "because", "but", "as"], 0, "Rescheduling is the result of the wifi issue."], ["I was tired ___ I had worked a double shift.", ["so", "because", "unless", "whether"], 1, "Working a double shift is the cause of being tired."], ["Prices went up, ___ sales slowed down.", ["so", "because", "yet", "but"], 0, "Slower sales is the result of higher prices."], ["The flight was cancelled ___ a storm grounded all planes.", ["because", "so", "yet", "as"], 0, "The storm is the cause of the cancellation."], ["She apologized sincerely, ___ he forgave her.", ["so", "because", "unless", "whether"], 0, "Forgiving is the result of the apology."], ["We ran out of milk, ___ I need to buy some today.", ["so", "because", "until", "but"], 0, "Needing to buy milk is the result of running out."]]}, {"id": "unless", "section": 1, "title": "UNLESS", "persona": "The Escape Hatch", "emoji": "🚪", "use": "Means 'except if' — the one condition that would stop something.", "avoid": "Never add 'not' after it — UNLESS already means 'if...not.'", "examples": [["Are we going to the park?", "We will go, unless it rains."], ["Will you come to the party?", "I'll come, unless something urgent comes up."]], "quiz": [["We won't go to the beach ___ the weather improves.", ["unless", "if not", "until", "whether"], 0, "'Unless' already means 'if...not' — no extra 'not' needed."], ["I won't sign the contract ___ my lawyer reviews it first.", ["unless", "if", "so", "as"], 0, "This is the one condition that would stop the signing."], ["Which sentence is correct?", ["She won't attend unless she isn't invited.", "She won't attend unless she is invited.", "She won't attend if she is invited.", "She won't attend when she isn't invited."], 1, "'Unless' already carries the 'not' meaning — adding 'isn't' creates a double negative."], ["You can't enter ___ you have a valid ticket.", ["unless", "if", "when", "whether"], 0, "Having a ticket is the one thing that allows entry."], ["I'll be there by 6, ___ my flight is delayed.", ["unless", "if not", "so", "as"], 0, "A delay is the one thing that would change the plan."], ["Which sentence avoids a double negative?", ["We won't leave unless it doesn't stop raining.", "We won't leave unless it stops raining.", "We won't leave until it doesn't stop raining.", "We won't leave whether it stops raining."], 1, "Adding 'doesn't' after 'unless' creates a double negative."], ["The store won't refund you ___ you have the receipt.", ["unless", "if", "when", "but"], 0, "No receipt is the one condition blocking a refund."], ["___ she calls first, I won't answer the door.", ["Unless", "If", "When", "Whether"], 0, "A call first is the one condition that would make you answer."], ["He'll miss the deadline ___ he starts right now.", ["unless", "if not", "until", "so"], 0, "Starting now is the one thing that prevents missing it."], ["Which sentence is correct?", ["I won't help unless you don't ask nicely.", "I won't help unless you ask nicely.", "I won't help if you don't ask nicely.", "I won't help as you ask nicely."], 1, "'Unless...don't' is a double negative; 'unless you ask' alone is correct."]]}, {"id": "whether", "section": 1, "title": "WHETHER", "persona": "The Coin Toss", "emoji": "🪙", "use": "Presents two or more alternatives.", "avoid": "Skip it for a simple condition with no 'or not' — plain IF is enough.", "examples": [["Is Mark joining us for dinner?", "I don't know whether he is coming or not."], ["Did she accept the offer?", "S function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function sectionColor(n){ return {1:'var(--connectors)',2:'var(--modals)',3:'var(--tenses)',4:'var(--preps)'}[n]; }

/* ---------- Firebase Auth & Firestore Sync ---------- */
async function loadProgressFor(email){
  try {
    const docSnap = await window.getDoc(window.doc(window.db, "users", email));
    if (docSnap.exists()){
      const p = docSnap.data();
      return { mastered: p.mastered || [], attempts: p.attempts || {} };
    }
  } catch(e){ console.error(e); }
  return { mastered: [], attempts: {} };
}

async function saveProgress(){
  if (!auth.currentUser) return;
  try {
    await window.updateDoc(window.doc(window.db, "users", auth.currentUser), {
      mastered: progress.mastered,
      attempts: progress.attempts
    });
  } catch(e){ console.error(e); }
}

async function attemptAuth(rawEmail, password){
  const email = String(rawEmail || '').trim().toLowerCase();
  if (!email || !password){ state.authError = 'Enter both an email and a password.'; render(); return; }
  if (!email.endsWith('@searce.com')){ state.authError = 'Please use a @searce.com email address.'; render(); return; }
  if (password.length < 4){ state.authError = 'Password should be at least 4 characters.'; render(); return; }
  state.authError = null; state.authBusy = true; render();
  
  try {
    await window.signInWithEmailAndPassword(window.fbAuth, email, password);
  } catch(e) {
    if (e.code === 'auth/invalid-credential') {
      try {
        await window.createUserWithEmailAndPassword(window.fbAuth, email, password);
        await window.setDoc(window.doc(window.db, "users", email), {
          email: email,
          status: email === 'jithu.sreekumar@searce.com' ? 'approved' : 'pending',
          createdAt: Date.now(),
          mastered: [],
          attempts: {}
        });
      } catch(createErr) {
        if (createErr.code === 'auth/email-already-in-use') {
          state.authBusy = false;
          state.authError = "Incorrect password.";
          render();
        } else {
          state.authBusy = false;
          state.authError = 'Could not sign in or sign up. ' + createErr.message;
          render();
        }
      }
    } else {
      state.authBusy = false;
      state.authError = e.message || 'Something went wrong. Please try again.';
      render();
    }
  }
}

function handleAuthSubmit(e){
  e.preventDefault();
  const email = document.getElementById('auth-email').value;
  const password = document.getElementById('auth-password').value;
  state.authEmailDraft = email;
  attemptAuth(email, password);
  return false;
}

async function logout(){
  await window.signOut(window.fbAuth);
}

function init(){
  window.fbAuth.onAuthStateChanged(async (user) => {
    if (user) {
      const email = user.email;
      auth.currentUser = email;
      
      const userDoc = await window.getDoc(window.doc(window.db, "users", email));
      if (!userDoc.exists()) {
        await window.setDoc(window.doc(window.db, "users", email), {
          email: email,
          status: email === 'jithu.sreekumar@searce.com' ? 'approved' : 'pending',
          createdAt: Date.now(),
          mastered: [],
          attempts: {}
        });
      }
      
      progress = await loadProgressFor(email);
      
      if (email === 'jithu.sreekumar@searce.com') {
        state.view = 'admin_loading';
        render();
        loadAdminData();
      } else {
        const udata = (await window.getDoc(window.doc(window.db, "users", email))).data();
        const userStatus = udata?.status || 'pending';
        state.view = (userStatus === 'pending') ? 'pending' : (userStatus === 'rejected' ? 'rejected' : 'home');
        render();
      }
      state.authBusy = false;
      state.authNote = null;
    } else {
      auth.currentUser = null;
      progress = { mastered: [], attempts: {} };
      state.view = 'auth';
      render();
    }
  });
}

async function loadAdminData() {
  try {
    const snap = await window.getDocs(window.collection(window.db, "users"));
    const users = [];
    snap.forEach(doc => users.push(doc.data()));
    state.adminUsersData = users;
    state.view = 'admin';
    render();
  } catch(e) {
    console.error(e);
    state.authError = "Failed to load admin data";
    state.view = 'auth';
    render();
  }
}
function render(){
  const app = document.getElementById('app');
  if (state.view === 'auth'){ app.innerHTML = renderAuth(); return; }
  if (state.view === 'home') app.innerHTML = renderHome();
  else if (state.view === 'pending') app.innerHTML = renderPending();
  else if (state.view === 'rejected') app.innerHTML = renderRejected();
  else if (state.view === 'admin' || state.view === 'admin_loading') app.innerHTML = renderAdmin();
  else if (state.view === 'admin_user_progress') app.innerHTML = renderAdminUserProgress();
  else if (state.view === 'topic') app.innerHTML = renderTopic(BY_ID[state.topicId]);
  else if (state.view === 'quiz') app.innerHTML = renderQuiz();
  else if (state.view === 'results') app.innerHTML = renderResults();
  const body = app.querySelector('.thread-body, .topic-list');
  if (body) body.scrollTop = 0;
}

function renderHome(){
  const masteredCount = progress.mastered.length;
  const pct = Math.round(masteredCount / TOPICS.length * 100);
  const list = TOPICS.filter(t => state.filter === 'all' || String(t.section) === state.filter);
  let rows = '';
  let lastSection = null;
  list.forEach(t => {
    if (state.filter === 'all' && t.section !== lastSection){
      lastSection = t.section;
      const s = SECTIONS[t.section];
      rows += `<div class="section-label" style="color:${s.color}">${escapeHtml(s.name)}</div>`;
    }
    const isMastered = progress.mastered.includes(t.id);
    const best = progress.attempts[t.id];
    const statusHTML = isMastered
      ? `<div class="status mastered">\u2713</div>`
      : (best != null ? `<div class="status tried">${best}/10</div>` : `<div class="status"></div>`);
    const color = SECTIONS[t.section].color;
    rows += `
      <button class="topic-row" onclick="openTopic('${t.id}')">
        <div class="avatar" style="background:${color}26;">${t.emoji}</div>
        <div class="topic-main">
          <div class="topic-title-row"><span class="topic-title">${escapeHtml(t.title)}</span><span class="topic-persona">${escapeHtml(t.persona)}</span></div>
          <div class="topic-preview">${escapeHtml(t.use)}</div>
        </div>
        ${statusHTML}
      </button>`;
  });
  const pills = ['all','1','2','3','4'].map(f => {
    const label = f === 'all' ? 'All' : SECTIONS[f].name;
    const color = f === 'all' ? '#F3F1EC' : SECTIONS[f].color;
    const active = state.filter === f;
    const style = active ? `background:${color};color:#0d0f14;` : '';
    return `<button class="pill ${active ? 'active' : ''}" style="${style}" onclick="setFilter('${f}')">${escapeHtml(label)}</button>`;
  }).join('');

  return `
    <div class="app-shell">
      <div class="topbar">
        <div class="brand">English, Conversationally<small>${masteredCount}/${TOPICS.length} mastered</small></div>
        <div class="progress-ring" style="--pct:${pct}"><span>${pct}%</span></div>

function renderTopic(t){
  const color = SECTIONS[t.section].color;
  const best = progress.attempts[t.id];
  const isMastered = progress.mastered.includes(t.id);
  const examplesHTML = t.examples.map(([q, a]) => `
      <div class="bubble-row in"><div class="bubble in">${escapeHtml(q)}</div></div>
      <div class="bubble-row out"><div class="bubble out" style="background:${color};">${escapeHtml(a)}</div></div>
  `).join('');
  const quizBtnLabel = isMastered ? 'Retake the quiz \u2014 mastered \u2713' : (best != null ? `Retry the quiz \u2014 best ${best}/10` : 'Start the 10-question quiz');
  return `
    <div class="app-shell">
      <div class="thread-header">
        <button class="back-btn" onclick="goHome()">\u2190</button>
        <div class="avatar" style="background:${color}26;width:36px;height:36px;font-size:17px;">${t.emoji}</div>
        <div><div class="thread-title">${escapeHtml(t.title)}</div><div class="thread-persona">${escapeHtml(t.persona)}</div></div>
      </div>
      <div class="thread-body">
        <div class="pinned-note">
          <div><span class="tag" style="background:${color}30;color:${color};">USE</span>${escapeHtml(t.use)}</div>
          ${t.avoid ? `<div><span class="tag" style="background:rgba(224,101,74,0.22);color:#F0967E;">AVOID</span>${escapeHtml(t.avoid)}</div>` : ''}
        </div>
        ${examplesHTML}
      </div>
      <div class="quiz-footer">
        <button class="btn-primary" style="background:${color};" onclick="startQuiz('${t.id}')">${quizBtnLabel}</button>
      </div>
    </div>`;
}

function startQuiz(id){
  const t = BY_ID[id];
  const qs = shuffle(t.quiz).map(entry => {
    const [question, options, correct, explain] = entry;
    const order = shuffle(options.map((o, i) => i));
    const newOptions = order.map(i => options[i]);
    const newCorrect = order.indexOf(correct);
    return { question, options: newOptions, correct: newCorrect, explain };
  });
  state.view = 'quiz';
  state.topicId = id;
  state.quiz = { questions: qs, idx: 0, score: 0, selected: null, answered: false };
  render();
}

function renderQuiz(){
  const t = BY_ID[state.topicId];
  const color = SECTIONS[t.section].color;
  const quiz = state.quiz;
  const q = quiz.questions[quiz.idx];
  const wide = q.options.some(o => o.length > 26);
  const optsHTML = q.options.map((opt, i) => {
    let cls = 'chip' + (wide ? ' wide' : '');
    if (quiz.answered){
      if (i === q.correct) cls += ' correct';
      else if (i === quiz.selected) cls += ' incorrect';
      else cls += ' dim';
    }
    return `<button class="${cls}" ${quiz.answered ? 'disabled' : ''} onclick="pickAnswer(${i})">${escapeHtml(opt)}</button>`;
  }).join('');
  const feedback = quiz.answered ? `
    <div class="pinned-note feedback ${quiz.selected === q.correct ? 'good' : 'bad'}">
      ${quiz.selected === q.correct ? '\u2705 Correct.' : '\u274C Not quite.'} ${escapeHtml(q.explain)}
    </div>` : '';
  const footerBtn = quiz.answered
    ? `<button class="btn-primary" style="background:${color};" onclick="nextQ()">${quiz.idx === 9 ? 'See results' : 'Next question \u2192'}</button>`
    : '';
  return `
    <div class="app-shell">
      <div class="thread-header">
        <button class="back-btn" onclick="backToTopic()">\u2190</button>
        <div><div class="thread-title">Quiz \u00B7 ${escapeHtml(t.title)}</div><div class="thread-persona">Question ${quiz.idx + 1} of 10 \u00B7 Score ${quiz.score}</div></div>
      </div>
      <div class="quiz-progress-track"><div class="quiz-progress-fill" style="width:${quiz.idx / 10 * 100}%;background:${color};"></div></div>
      <div class="thread-body centered">
        <div class="bubble-row in"><div class="bubble in">${escapeHtml(q.question)}</div></div>
        <div class="${wide ? 'options-stack' : 'chips-wrap'}">${optsHTML}</div>
        ${feedback}
      </div>
      <div class="quiz-footer">${footerBtn}</div>
    </div>`;
}

function pickAnswer(i){
  if (state.quiz.answered) return;
  state.quiz.selected = i;
  state.quiz.answered = true;
  const q = state.quiz.questions[state.quiz.idx];
  if (i === q.correct) state.quiz.score++;
  render();
}

function nextQ(){
  if (state.quiz.idx === 9){
    const id = state.topicId;
    const score = state.quiz.score;
    if (progress.attempts[id] == null || score > progress.attempts[id]) progress.attempts[id] = score;
    if (score === 10 && !progress.mastered.includes(id)) progress.mastered.push(id);
    saveProgress();
    state.view = 'results';
    render();
    return;
  }
  state.quiz.idx++;
  state.quiz.selected = null;
  state.quiz.answered = false;
  render();
}

function getNextTopicId(id){
  const idx = TOPICS.findIndex(t => t.id === id);
  return (idx >= 0 && idx < TOPICS.length - 1) ? TOPICS[idx + 1].id : null;
}

function renderResults(){
  const t = BY_ID[state.topicId];
  const color = SECTIONS[t.section].color;
  const score = state.quiz.score;
  const passed = score === 10;
  const nextTopic = getNextTopicId(t.id);
  let buttonsHTML;
  if (!passed){
    buttonsHTML = `<button class="btn-secondary" onclick="backToTopic()">Review topic</button><button class="btn-primary" style="background:${color};" onclick="startQuiz('${t.id}')">Retry quiz</button>`;
  } else if (nextTopic){
    buttonsHTML = `<button class="btn-secondary" onclick="openTopic('${t.id}')">Back to topic</button><button class="btn-primary" style="background:${color};" onclick="openTopic('${nextTopic}')">Next topic \u2192</button>`;
  } else {
    buttonsHTML = `<button class="btn-primary" style="background:${color};" onclick="goHome()">Back to all topics</button>`;
  }
  if (passed) setTimeout(launchConfetti, 80);
  return `
    <div class="app-shell">
      <div class="thread-header">
        <button class="back-btn" onclick="backToTopic()">\u2190</button>
        <div class="thread-title">Results</div>
      </div>
      <div class="results-wrap" id="confetti-zone">
        <div class="score-badge" style="color:${passed ? 'var(--good)' : 'var(--bad)'}">${score}/10</div>
        <div class="results-msg">${passed ? `You've mastered ${escapeHtml(t.title)}! Nice work.` : `You need 10/10 to master ${escapeHtml(t.title)}. Review the rule below and give it another go \u2014 the questions will reshuffle.`}</div>
        <div class="btn-row">${buttonsHTML}</div>
      </div>
    </div>`;
}

function launchConfetti(){
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const zone = document.getElementById('confetti-zone');
  if (!zone) return;
  const colors = ['#E8823C', '#9D5CE0', '#3FAE7A', '#4A9FE0', '#F3F1EC'];
  for (let i = 0; i < 26; i++){
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + '%';
    el.style.background = colors[i % colors.length];
    el.style.animationDelay = (Math.random() * 0.35) + 's';
    el.style.transform = `rotate(${Math.random() * 360}deg)`;
    zone.appendChild(el);
    setTimeout(() => el.remove(), 2300);
  }
}

window.openTopic = id => { state.view = 'topic'; state.topicId = id; render(); };
window.goHome = () => { state.view = 'home'; render(); };
window.setFilter = f => { state.filter = f; render(); };
window.startQuiz = startQuiz;
window.pickAnswer = pickAnswer;
window.nextQ = nextQ;
window.backToTopic = () => { state.view = 'topic'; render(); };
window.handleAuthSubmit = handleAuthSubmit;
window.logout = logout;

init();
</script>
</body>
</html>
